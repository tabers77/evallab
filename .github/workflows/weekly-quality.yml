# ============================================================
# Copy this file to your repo at:
#   .github/workflows/weekly-quality.yml
#
# Then add 4 secrets to your repo (Settings > Secrets > Actions):
#   AZURE_CLIENT_ID       → Service principal client ID
#   AZURE_TENANT_ID       → Your Azure tenant ID
#   AZURE_CLIENT_SECRET   → Service principal secret
#   KEY_VAULT_ENDPOINT    → https://your-keyvault.vault.azure.net/
# ============================================================

name: Weekly Quality Check

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday 9am UTC
  workflow_dispatch:
    inputs:
      analysis_mode:
        description: "Analysis mode"
        type: choice
        options: ["upgrade", "strategic", "both"]
        default: "both"

permissions:
  contents: read
  issues: write

jobs:
  quality:
    uses: tabers77/claude_experiments/.github/workflows/weekly-quality-check.yml@master
    with:
      analysis_mode: ${{ github.event.inputs.analysis_mode || 'both' }}
      model: "gpt-5.2"
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      KEY_VAULT_ENDPOINT: ${{ secrets.KEY_VAULT_ENDPOINT }}
